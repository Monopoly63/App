name: Build Hablas APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, example: v1.0.0'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Build web bundle
        run: |
          npm ci
          npm run build
          mkdir -p app/src/main/assets
          cp dist/index.html app/src/main/assets/index.html
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace
      - name: Rename APK
        run: |
          mkdir -p release
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          cp app/build/outputs/apk/debug/app-debug.apk "release/Hablas-${TAG_NAME}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: Hablas-apk
          path: release/*.apk
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Hablas ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Hablas Android APK generated from the uploaded glassmorphic music player package.

            - WebView wrapper around the premium glass UI.
            - Local music selection through Android document picker.
            - Blurred glass icon.
          files: release/*.apk
