name: Build Hablas Native APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, example: v2.0.0'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace
      - name: Rename APK
        run: |
          mkdir -p release
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          cp app/build/outputs/apk/debug/app-debug.apk "release/Hablas-Native-${TAG_NAME}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: Hablas-Native-apk
          path: release/*.apk
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Hablas Native ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Hablas rebuilt as a real native Android app.

            - Kotlin + Jetpack Compose, no WebView.
            - MediaStore local library scanner.
            - Folder-first organization for messy devices.
            - Media3 ExoPlayer playback.
            - 120Hz-friendly UI pass with reduced expensive blur.
            - Glass iOS/MagicOS-inspired icon and interface.
          files: release/*.apk
